            <a href="#contact" class="btn-main tr" data-ar="ابدأ مشروعك" data-en="Start Your Project" data-fr="Commencer" data-es="Empezar">ابدأ مشروعك</a>
        </div>
    </section>

    <script>
        function changeLanguage(lang) {
            // تغيير اتجاه الصفحة
            if (lang === 'ar') {
                document.documentElement.dir = "rtl";
                document.documentElement.lang = "ar";
            } else {
                document.documentElement.dir = "ltr";
                document.documentElement.lang = lang;
            }

            // تحديث النصوص التي تحمل كلاس tr
            const elements = document.querySelectorAll('.tr');
            elements.forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) el.innerText = text;
            });

            // تحديث حالة الأزرار
            document.querySelectorAll('.lang-switcher button').forEach(btn => btn.classList.remove('lang-active'));
            document.getElementById(`btn-${lang}`).classList.add('lang-active');

            // حفظ اللغة في المتصفح
            localStorage.setItem('preferredLang', lang);
        }

        // تحميل اللغة المحفوظة عند فتح الموقع
        window.onload = () => {
            const savedLang = localStorage.getItem('preferredLang') || 'ar';
            changeLanguage(savedLang);
        };
    </script>
</body>
